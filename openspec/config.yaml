schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  Domain: Web3 / Blockchain development lab (web3-lab)
  Architecture: Monorepo with Ethereum PoS infrastructure on Minikube
  Tech Stack:
    - Package Management: Pixi (conda-forge)
    - Blockchain: Go-Ethereum (Geth) — Execution Layer
    - Consensus: Prysm / Lighthouse — Consensus Layer (Beacon + Validator)
    - Infrastructure: Docker, Kubernetes (Minikube), Makefile
  Conventions:
    - We use spec-driven development via OpenSpec
    - Tooling is bridged via Pixi for consistent environments
    - Deployments follow the `deployments/kubernetes/minikube/` layout
    - PoS cluster runs 3 layers: Geth (EL), Beacon (CL), Validator

# Per-artifact rules (optional)
rules:
  proposal:
    - Always include a "Capabilities" section with kebab-case identifiers
    - Clearly state "Why" and "What Changes"
  design:
    - Include a "Decisions" section with rationale
    - List "Risks / Trade-offs"
  tasks:
    - Group tasks by functional area
    - Use clear, actionable descriptions
