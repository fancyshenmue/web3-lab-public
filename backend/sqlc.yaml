version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/query"
    schema: "../migrations/postgres"
    gen:
      go:
        package: "sqlc"
        out: "internal/database/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
