# =============================================================================
# Geth (Execution Layer) PVs — 3 nodes
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: geth-pv-0
  labels:
    type: local
spec:
  storageClassName: standard
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/data/geth/data0"
    type: DirectoryOrCreate
  claimRef:
    namespace: web3
    name: geth-data-geth-0
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - web3-lab
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: geth-pv-1
  labels:
    type: local
spec:
  storageClassName: standard
