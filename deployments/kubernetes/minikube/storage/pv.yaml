    type: DirectoryOrCreate
  claimRef:
    namespace: web3
    name: geth-data-geth-1
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - web3-lab-m02
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: geth-pv-2
  labels:
    type: local
