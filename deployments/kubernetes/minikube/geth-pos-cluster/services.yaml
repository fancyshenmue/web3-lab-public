# Geth Services
# Headless service for StatefulSet DNS (geth-0.geth-headless, etc.)
apiVersion: v1
kind: Service
metadata:
  name: geth-headless
  namespace: web3
  labels:
    app: geth
spec:
  ports:
    - port: 8545
      name: rpc
    - port: 8546
      name: ws
    - port: 8551
      name: engine
    - port: 30303
      name: p2p
  clusterIP: None
  selector:
    app: geth
---
# ClusterIP service for RPC/WS access (load-balanced across all geth nodes)
apiVersion: v1
kind: Service
metadata:
  name: geth-rpc
  namespace: web3
  labels:
    app: geth
spec:
  type: ClusterIP
  ports:
    - port: 8545
      targetPort: 8545
      name: rpc
    - port: 8546
      targetPort: 8546
      name: ws
  selector:
    app: geth
