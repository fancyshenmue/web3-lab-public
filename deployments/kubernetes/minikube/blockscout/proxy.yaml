# Blockscout Nginx Reverse Proxy — serves frontend + backend on same origin
# Eliminates CORS issues by routing /api and /socket to the backend
apiVersion: v1
kind: ConfigMap
metadata:
  name: blockscout-proxy-config
  namespace: web3
data:
  nginx.conf: |
    server {
      listen 80;
      server_name _;

      # Mock legacy v1 endpoint (removed in backend v9, still called by frontend)
      location = /api/v1/pages/main {
        default_type application/json;
        return 200 '{"exchange_rate":null,"transaction_count":0}';
      }

      # Backend API & socket
      location /api {
        proxy_pass http://blockscout-backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /socket {
        proxy_pass http://blockscout-backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
      }

      # Stats API
      location /stats-api {
        rewrite ^/stats-api/(.*) /$1 break;
        proxy_pass http://blockscout-stats:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }

      # Frontend (default)
      location / {
        proxy_pass http://blockscout-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockscout-proxy
  namespace: web3
  labels:
    app: blockscout-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockscout-proxy
  template:
    metadata:
      labels:
        app: blockscout-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: blockscout-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: blockscout-proxy
  namespace: web3
  labels:
    app: blockscout-proxy
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: blockscout-proxy
