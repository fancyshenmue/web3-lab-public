# Blockscout Stats — Deployment (Rust microservice)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockscout-stats
  namespace: web3
  labels:
    app: blockscout-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockscout-stats
  template:
    metadata:
      labels:
        app: blockscout-stats
    spec:
      containers:
        - name: stats
          image: ghcr.io/blockscout/stats:latest
          ports:
            - containerPort: 8050
              name: http
          env:
            - name: STATS__DB_URL
              value: "postgresql://blockscout:blockscout@blockscout-postgres:5432/blockscout_stats"
            - name: STATS__BLOCKSCOUT_DB_URL
              value: "postgresql://blockscout:blockscout@blockscout-postgres:5432/blockscout"
            - name: STATS__CREATE_DATABASE
              value: "true"
            - name: STATS__RUN_MIGRATIONS
              value: "true"
            - name: STATS__SERVER__HTTP__ENABLED
              value: "true"
            - name: STATS__SERVER__HTTP__ADDR
              value: "0.0.0.0:8050"
            - name: STATS__BLOCKSCOUT_API_URL
              value: "http://blockscout-backend:4000"
            - name: STATS__SERVER__HTTP__CORS__ENABLED
              value: "true"
            - name: STATS__SERVER__HTTP__CORS__ALLOWED_ORIGIN
              value: "http://localhost:3001"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
# ClusterIP service for Stats
apiVersion: v1
kind: Service
metadata:
  name: blockscout-stats
  namespace: web3
  labels:
    app: blockscout-stats
spec:
  type: ClusterIP
  ports:
    - port: 8050
      targetPort: 8050
      name: http
  selector:
    app: blockscout-stats
