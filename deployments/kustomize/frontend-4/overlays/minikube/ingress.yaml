apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web3-frontend-4-ingress
  annotations:
    cert-manager.io/cluster-issuer: local-ca-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.web3-local-dev-2.net
      secretName: web3-frontend-4-tls
  rules:
    - host: app.web3-local-dev-2.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web3-frontend-4
                port:
                  number: 80
