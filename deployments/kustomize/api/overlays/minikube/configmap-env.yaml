apiVersion: v1
kind: ConfigMap
metadata:
  name: web3-api-env
  labels:
    app: web3-api
    component: backend
data:
  # Server
  PORT: "8080"
  HOST: "0.0.0.0"
  GIN_MODE: "debug"
  ENVIRONMENT: "development"
  LOG_LEVEL: "debug"

  # Auth Services
  KRATOS_PUBLIC_URL: "http://kratos-public.web3.svc.cluster.local:4433"
  KRATOS_ADMIN_URL: "http://kratos-admin.web3.svc.cluster.local:4434"
  HYDRA_PUBLIC_URL: "http://hydra-public.web3.svc.cluster.local:4444"
  HYDRA_ADMIN_URL: "http://hydra-admin.web3.svc.cluster.local:4445"

  # SpiceDB
  SPICEDB_ENDPOINT: "spicedb-grpc.web3.svc.cluster.local:50051"
  SPICEDB_INSECURE: "true"

  # Redis
  REDIS_HOST: "redis-service.web3.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DATABASE: "0"
  REDIS_POOL_SIZE: "10"
  REDIS_KEY_PREFIX: "web3"
  REDIS_NONCE_KEY_PREFIX: "auth:nonce:"
  REDIS_NONCE_TTL_MINUTES: "5"
  REDIS_TLS_ENABLED: "false"

  # Database (PostgreSQL instead of Spanner)
  POSTGRES_DSN: "postgres://postgres:postgres@auth-postgres.web3.svc.cluster.local:5432/account?sslmode=disable"

  # Frontend
  FRONTEND_URL: "https://app.web3-local-dev.com"

  # CORS
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001,https://app.web3-local-dev.com"
  CORS_ALLOW_ALL: "true"

  # Swagger
  SWAGGER_HOST: "localhost:8080"
  SWAGGER_SCHEME: "http"
