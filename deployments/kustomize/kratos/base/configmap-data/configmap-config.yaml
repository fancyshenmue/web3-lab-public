apiVersion: v1
kind: ConfigMap
metadata:
  name: kratos-config
  labels:
    app: kratos
    component: identity
data:
  kratos.yml: |
    version: v1.2.0
    dsn: env://DSN

    oauth2_provider:
      url: http://hydra-admin.web3.svc.cluster.local:4445
    
    serve:
      public:
        base_url: env://SERVE_PUBLIC_BASE_URL
        cors:
          enabled: true
          allowed_origins:
            - https://app.web3-local-dev.com
            - https://gateway.web3-local-dev.com
          allowed_methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            - PATCH
          allowed_headers:
            - Content-Type
            - Authorization
            - Accept
            - X-CSRF-Token
            - Cookie
          exposed_headers:
            - Content-Type
            - Set-Cookie
          allow_credentials: true
      admin:
        base_url: env://SERVE_ADMIN_BASE_URL

    cookies:
      domain: .web3-local-dev.com
      same_site: None
      path: /
          
    selfservice:
      default_browser_return_url: env://SELFSERVICE_DEFAULT_BROWSER_RETURN_URL
      allowed_return_urls:
        - env://SELFSERVICE_UI_BASE_URL
      flows:
        error:
          ui_url: env://SELFSERVICE_UI_BASE_URL
        login:
          ui_url: env://SELFSERVICE_UI_BASE_URL
        registration:
          ui_url: env://SELFSERVICE_UI_BASE_URL
          enabled: true
          after:
            password:
              hooks:
                - hook: session
                - hook: web_hook
                  config:
                    url: http://web3-api.web3.svc.cluster.local:8080/api/v1/oauth2/registration-webhook
                    method: POST
                    body: file:///etc/config/kratos/registration-webhook-email.jsonnet
                    response:
                      ignore: true
                    can_interrupt: false
            oidc:
              hooks:
                - hook: session
                - hook: web_hook
                  config:
                    url: http://web3-api.web3.svc.cluster.local:8080/api/v1/oauth2/registration-webhook
                    method: POST
                    body: file:///etc/config/kratos/registration-webhook-oidc.jsonnet
                    response:
                      ignore: true
                    can_interrupt: false
      methods:
        password:
          enabled: true
        oidc:
          enabled: true

    log:
      level: debug
      format: json

    secrets:
      cookie:
        - env://SECRETS_COOKIE
      cipher:
        - "32-bytes-long-secret-for-kratos-cipher-test"
        
    ciphers:
      algorithm: xchacha20-poly1305

    hashers:
      argon2:
        parallelism: 1
        memory: 128MB
        iterations: 2
        salt_length: 16
        key_length: 16

    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/config/kratos/identity.schema.json
          
    courier:
      smtp:
        connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true

  identity.schema.json: |
    {
      "$id": "https://schemas.ory.sh/presets/kratos/quickstart/email-password/identity.schema.json",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "User",
      "type": "object",
      "properties": {
        "traits": {
          "type": "object",
          "properties": {
            "email": {
              "type": "string",
              "format": "email",
              "title": "E-Mail",
              "ory.sh/kratos": {
                "credentials": {
                  "password": {
                    "identifier": true
                  }
                }
              }
            },
            "wallet_address": {
              "type": "string",
              "title": "Wallet Address",
              "pattern": "^0x[a-fA-F0-9]{40}$"
            }
          },
          "additionalProperties": false
        }
      }
    }

  oidc.google.jsonnet: |
    local claims = {
      email_verified: false
    } + std.extVar('claims');

    {
      identity: {
        traits: {
          [if "email" in claims && claims.email_verified then "email" else null]: claims.email,
        },
      },
    }

  registration-webhook-email.jsonnet: |
    function(ctx) {
      identity_id: ctx.identity.id,
      email: if "email" in ctx.identity.traits then ctx.identity.traits.email else "",
      provider: "email",
    }

  registration-webhook-oidc.jsonnet: |
    function(ctx) {
      identity_id: ctx.identity.id,
      email: if "email" in ctx.identity.traits then ctx.identity.traits.email else "",
      provider: "google",
    }
