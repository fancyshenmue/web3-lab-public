apiVersion: apps/v1
kind: Deployment
metadata:
  name: kratos-deployment
spec:
  replicas: 1
  template:
    spec:
      initContainers:
        - name: kratos-migrate
          envFrom:
            - configMapRef:
                name: kratos-env
            - secretRef:
                name: kratos-oidc-secret
      containers:
        - name: kratos
          envFrom:
            - configMapRef:
                name: kratos-env
            - secretRef:
                name: kratos-oidc-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
