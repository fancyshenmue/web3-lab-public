apiVersion: v1
kind: Service
metadata:
  name: oathkeeper-proxy
  labels:
    app: oathkeeper
    component: proxy
spec:
  type: ClusterIP
  selector:
    app: oathkeeper
  ports:
    - name: proxy
      port: 4455
      targetPort: 4455
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: oathkeeper-api
  labels:
    app: oathkeeper
    component: api
spec:
  type: ClusterIP
  selector:
    app: oathkeeper
  ports:
    - name: api
      port: 4456
      targetPort: 4456
      protocol: TCP
