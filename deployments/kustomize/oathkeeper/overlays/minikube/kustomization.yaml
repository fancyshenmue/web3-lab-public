apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: web3

resources:
  - ../../base
  - configmap-env.yaml
  - ingress.yaml

patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: oathkeeper-deployment

labels:
  - pairs:
      environment: minikube
